<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 - 页面未找到</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;800&family=Inter:wght@600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #f7faf9;
        --surface: #ffffff;
        --line: #dfeae5;
        --text: #1f2d28;
        --muted: #65766f;
        --green: #18a77b;
        --green-deep: #0c7d5c;
        --shadow: 0 18px 50px rgba(35, 86, 69, 0.1);
        --radius: 8px;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        display: flex;
        min-height: 100vh;
        align-items: center;
        justify-content: center;
        padding: 22px;
        background:
          linear-gradient(180deg, rgba(242, 250, 247, 0.94), rgba(255, 255, 255, 0.88)),
          repeating-linear-gradient(90deg, rgba(24, 167, 123, 0.05) 0 1px, transparent 1px 72px),
          repeating-linear-gradient(0deg, rgba(53, 136, 216, 0.04) 0 1px, transparent 1px 72px),
          var(--bg);
        color: var(--text);
        font-family: "Inter", "Noto Sans SC", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .error-card {
        width: min(520px, 100%);
        padding: 34px;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: rgba(255, 255, 255, 0.94);
        box-shadow: var(--shadow);
        text-align: center;
      }

      .code {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 86px;
        height: 46px;
        margin-bottom: 20px;
        border-radius: var(--radius);
        background: #e7f8f1;
        color: var(--green-deep);
        font-size: 26px;
        font-weight: 900;
      }

      h1 {
        margin-bottom: 10px;
        font-size: clamp(28px, 7vw, 42px);
        line-height: 1.12;
        letter-spacing: 0;
      }

      p {
        margin: 0 auto 26px;
        color: var(--muted);
        font-size: 15px;
        line-height: 1.7;
      }

      .btn-group {
        display: flex;
        gap: 10px;
        justify-content: center;
      }

      .btn {
        display: inline-flex;
        min-height: 44px;
        align-items: center;
        justify-content: center;
        gap: 8px;
        padding: 0 16px;
        border-radius: var(--radius);
        font-weight: 900;
        text-decoration: none;
        transition: transform 0.2s ease;
      }

      .btn:hover {
        transform: translateY(-2px);
      }

      .btn-primary {
        background: var(--green);
        color: #fff;
      }

      .btn-outline {
        border: 1px solid var(--line);
        background: #fff;
        color: var(--text);
      }

      @media (max-width: 460px) {
        .error-card {
          padding: 24px;
        }

        .btn-group {
          display: grid;
        }
      }
    </style>
  </head>
  <body>
    <main class="error-card">
      <div class="code">404</div>
      <h1>页面暂时走丢了</h1>
      <p>你访问的页面可能已被删除、改名，或者链接输入有误。可以返回上一页，也可以回到首页重新进入。</p>
      <div class="btn-group">
        <a href="javascript:history.back()" class="btn btn-outline">
          <i class="fas fa-arrow-left"></i>
          返回上一页
        </a>
        <a href="/" class="btn btn-primary">
          <i class="fas fa-house"></i>
          回到首页
        </a>
      </div>
    </main>
  </body>
</html>
