<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>链接精简器 | 极简短链</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;800&family=Inter:wght@500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="https://crazypeace.github.io/Url-Shorten-Worker/styles.css" />
    <style>
      :root {
        --brand: #18a77b;
        --brand-hover: #12936c;
        --brand-deep: #0c7d5c;
        --brand-soft: #e7f8f1;
        --bg: #f7faf9;
        --surface: #ffffff;
        --surface-blue: #eef7ff;
        --line: #dfeae5;
        --line-strong: #c8ddd4;
        --text: #1f2d28;
        --muted: #65766f;
        --faint: #8ca09a;
        --green: var(--brand);
        --green-deep: var(--brand-deep);
        --blue: #3588d8;
        --coral: #f06f5f;
        --danger-soft: #fff0ed;
        --shadow: 0 18px 50px rgba(35, 86, 69, 0.1);
        --shadow-soft: 0 10px 28px rgba(35, 86, 69, 0.08);
        --shadow-focus: 0 0 0 4px rgba(24, 167, 123, 0.14);
        --radius: 8px;
        --duration-fast: 160ms;
        --duration-normal: 220ms;
        --ease: cubic-bezier(0.2, 0, 0, 1);
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        padding-bottom: 44px;
        background:
          linear-gradient(180deg, rgba(242, 250, 247, 0.94), rgba(255, 255, 255, 0.88)),
          repeating-linear-gradient(90deg, rgba(24, 167, 123, 0.05) 0 1px, transparent 1px 72px),
          repeating-linear-gradient(0deg, rgba(53, 136, 216, 0.04) 0 1px, transparent 1px 72px),
          var(--bg);
        color: var(--text);
        font-family: "Inter", "Noto Sans SC", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      a {
        color: inherit;
      }

      :where(a, button, input, [tabindex]):focus-visible {
        outline: none;
        box-shadow: var(--shadow-focus);
      }

      .topbar {
        position: sticky;
        top: 0;
        z-index: 20;
        display: flex;
        align-items: center;
        justify-content: space-between;
        min-height: 66px;
        padding: 12px max(20px, calc((100vw - 940px) / 2));
        border-bottom: 1px solid rgba(223, 234, 229, 0.86);
        background: rgba(247, 250, 249, 0.9);
        backdrop-filter: blur(18px);
      }

      .brand,
      .back-link {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        text-decoration: none;
      }

      .brand {
        font-size: 18px;
        font-weight: 900;
      }

      .brand i {
        display: inline-flex;
        width: 42px;
        height: 42px;
        align-items: center;
        justify-content: center;
        border-radius: var(--radius);
        background: #e5f6ef;
        color: var(--green-deep);
      }

      .back-link {
        color: var(--muted);
        font-size: 14px;
        font-weight: 800;
      }

      .main-container {
        width: min(940px, 100%);
        margin: 0 auto;
        padding: 28px 20px 0;
      }

      .hero {
        margin-bottom: 18px;
        padding: 30px;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background:
          linear-gradient(120deg, rgba(255, 255, 255, 0.96), rgba(238, 247, 255, 0.9)),
          linear-gradient(90deg, transparent, rgba(24, 167, 123, 0.08));
        box-shadow: var(--shadow);
      }

      .hero-label {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        min-height: 30px;
        padding: 5px 10px;
        border-radius: 999px;
        background: #e7f8f1;
        color: var(--green-deep);
        font-size: 13px;
        font-weight: 900;
      }

      .hero h1 {
        margin: 14px 0 8px;
        font-size: clamp(32px, 5vw, 52px);
        line-height: 1.08;
        letter-spacing: 0;
        font-weight: 900;
      }

      .hero p {
        max-width: 620px;
        margin: 0;
        color: var(--muted);
        font-size: 16px;
      }

      .panel {
        margin-bottom: 18px;
        padding: 24px;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: rgba(255, 255, 255, 0.92);
        box-shadow: var(--shadow-soft);
      }

      .panel-title {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 14px;
        margin-bottom: 18px;
      }

      .panel-title h2 {
        margin: 0;
        font-size: 22px;
        font-weight: 900;
      }

      .panel-title p {
        margin: 0;
        color: var(--muted);
        font-size: 14px;
      }

      .custom-input-group {
        position: relative;
        margin-bottom: 14px;
      }

      .field-label {
        display: block;
        margin-bottom: 8px;
        color: var(--text);
        font-size: 13px;
        font-weight: 800;
      }

      .custom-input-group i {
        position: absolute;
        top: auto;
        bottom: 17px;
        left: 14px;
        z-index: 2;
        color: #8ca09a;
      }

      .form-control-custom {
        width: 100%;
        min-height: 50px;
        padding: 0 14px 0 42px;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        outline: none;
        background: #fbfefd;
        color: var(--text);
        transition: border-color 0.2s ease, box-shadow 0.2s ease;
      }

      .form-control-custom:focus {
        border-color: var(--green);
        box-shadow: var(--shadow-focus);
      }

      .btn-main,
      .btn-action {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        min-height: 44px;
        border: 0;
        border-radius: var(--radius);
        color: #fff;
        font-weight: 900;
        transition: transform 0.2s ease, filter 0.2s ease;
      }

      .btn-main {
        width: 100%;
        min-height: 50px;
        background: var(--green);
        box-shadow: 0 12px 24px rgba(24, 167, 123, 0.22);
      }

      .btn-action {
        flex: 1 1 160px;
        padding: 0 14px;
      }

      .btn-main:hover,
      .btn-action:hover {
        color: #fff;
        filter: brightness(0.97);
        transform: translateY(-2px);
      }

      .btn-refresh {
        background: var(--green);
      }

      .btn-cloud {
        background: var(--blue);
      }

      .btn-clear {
        background: var(--coral);
      }

      .btn-action:disabled,
      .btn-main:disabled,
      .btn-action.is-loading,
      .btn-main.is-loading {
        cursor: not-allowed;
        opacity: 0.58;
        transform: none;
      }

      .action-bar {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-bottom: 16px;
      }

      .list-group-item {
        margin-bottom: 10px;
        padding: 14px !important;
        border: 1px solid var(--line) !important;
        border-radius: var(--radius) !important;
        background: #fff !important;
      }

      .list-group-item .form-control {
        border: 0;
        background: transparent;
        color: var(--green-deep);
        font-weight: 800;
      }

      .list-group-item small {
        display: block;
        margin-top: 6px;
        color: var(--muted);
        word-break: break-all;
      }

      .empty-state {
        display: grid;
        place-items: center;
        min-height: 180px;
        padding: 26px;
        border: 1px dashed var(--line-strong);
        border-radius: var(--radius);
        background: #fbfefd;
        text-align: center;
      }

      .empty-state.is-hidden {
        display: none;
      }

      .empty-icon {
        display: inline-flex;
        width: 46px;
        height: 46px;
        align-items: center;
        justify-content: center;
        margin-bottom: 12px;
        border-radius: var(--radius);
        background: var(--brand-soft);
        color: var(--green-deep);
      }

      .empty-state h3 {
        margin: 0 0 6px;
        font-size: 17px;
        font-weight: 900;
      }

      .empty-state p {
        max-width: 360px;
        margin: 0;
        color: var(--muted);
        font-size: 14px;
        line-height: 1.7;
      }

      .modal-content {
        border: 0;
        border-radius: var(--radius);
        box-shadow: var(--shadow);
      }

      .modal-header {
        border: 0;
        background: #e7f8f1;
        color: var(--green-deep);
      }

      .modal-title {
        font-weight: 900;
      }

      .result-link {
        color: var(--green-deep);
        font-size: 1.05rem;
        font-weight: 800;
        word-break: break-all;
      }

      .footer-note {
        color: var(--muted);
        text-align: center;
        font-size: 13px;
      }

      @media (max-width: 576px) {
        .topbar {
          min-height: 58px;
          padding: 9px 14px;
        }

        .back-link span {
          display: none;
        }

        .main-container {
          padding: 18px 14px 0;
        }

        .hero,
        .panel {
          padding: 20px;
        }

        .panel-title {
          display: block;
        }

        .panel-title p {
          margin-top: 4px;
        }

        .list-group-item .input-group {
          flex-wrap: wrap;
          gap: 6px;
        }

        .list-group-item .form-control {
          order: -1;
          width: 100%;
          padding-left: 0;
        }

        .modal-dialog {
          align-items: flex-end;
          min-height: 100%;
          margin: 0;
        }

        .modal-content {
          border-bottom-right-radius: 0;
          border-bottom-left-radius: 0;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          scroll-behavior: auto !important;
          animation-duration: 0.001ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.001ms !important;
        }
      }
    </style>
  </head>

  <body>
    <nav class="topbar">
      <a href="index.html" class="brand">
        <i class="fas fa-link"></i>
        <span>极简短链</span>
      </a>
      <a href="index.html" class="back-link">
        <i class="fas fa-arrow-left"></i>
        <span>返回首页</span>
      </a>
    </nav>

    <main class="main-container">
      <section class="hero">
        <span class="hero-label"><i class="fas fa-wand-magic-sparkles"></i> Link Studio</span>
        <h1>把长链接收纳得更清爽</h1>
        <p>输入原始链接，可选自定义后缀，生成后会在下方列表中保留记录。</p>
      </section>

      <section class="panel">
        <div class="panel-title">
          <h2>生成短链</h2>
          <p>支持粘贴完整 URL</p>
        </div>

        <div class="custom-input-group">
          <label class="field-label" for="longURL">原始链接</label>
          <i class="fas fa-link"></i>
          <input
            type="text"
            class="form-control-custom"
            id="longURL"
            placeholder="粘贴长链接，例如 https://example.com/..."
            oninput="loadUrlList()"
          />
        </div>

        <div class="row">
          <div class="col-md-6">
            <div class="custom-input-group">
              <label class="field-label" for="keyPhrase">自定义后缀</label>
              <i class="fas fa-tag"></i>
              <input
                type="text"
                class="form-control-custom"
                id="keyPhrase"
                placeholder="自定义后缀，可选"
              />
            </div>
          </div>
          <div class="col-md-6">
            <div class="custom-input-group">
              <label class="field-label" for="passwordText">访问密码</label>
              <i class="fas fa-key"></i>
              <input
                class="form-control-custom"
                type="text"
                value="__PASSWORD__"
                id="passwordText"
                placeholder="访问密码"
              />
            </div>
          </div>
        </div>

        <button class="btn-main" type="button" onclick="shorturl()" id="addBtn">
          <i class="fas fa-wand-magic-sparkles"></i>
          立即生成短链接
        </button>
      </section>

      <section class="panel">
        <div class="panel-title">
          <h2>我的短链</h2>
          <p>同步、刷新或清空本地记录</p>
        </div>

        <div class="action-bar">
          <button class="btn-action btn-refresh" type="button" onclick="loadUrlList()" id="loadListBtn">
            <i class="fas fa-rotate"></i>
            刷新列表
          </button>
          <button class="btn-action btn-cloud" type="button" onclick="loadKV()" id="loadKV2localStgBtn">
            <i class="fas fa-cloud-arrow-down"></i>
            云端获取
          </button>
          <button
            class="btn-action btn-clear"
            type="button"
            onclick="clearLocalStorage()"
            id="clearlocalStgBtn"
          >
            <i class="fas fa-trash-can"></i>
            清空记录
          </button>
        </div>

        <div id="urlList" class="list-group list-group-flush"></div>
        <div id="urlEmptyState" class="empty-state" aria-live="polite">
          <div>
            <span class="empty-icon"><i class="fas fa-inbox"></i></span>
            <h3>还没有短链记录</h3>
            <p>粘贴一个长链接并点击生成，成功后的短链会出现在这里，方便复制和管理。</p>
          </div>
        </div>
      </section>

      <div class="footer-note">© 2025 Link Shortener Service</div>
    </main>

    <div class="modal fade" id="resultModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">
              <i class="fas fa-circle-check me-2"></i>
              生成成功
            </h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div
            class="modal-body text-center py-4 result-link"
            id="result"
          >
            暂无结果
          </div>
          <div class="modal-footer justify-content-center border-0 pb-4">
            <button
              type="button"
              class="btn btn-success px-4"
              onclick='copyurl("result")'
              data-bs-toggle="popover"
              data-bs-placement="top"
              data-bs-content="已复制"
            >
              <i class="fas fa-copy me-2"></i>
              复制链接
            </button>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/lrsjng/jquery-qrcode@0.18.0/dist/jquery-qrcode.min.js"></script>
    <script>
      localStorage.removeItem("jiedian_auth_v2");
    </script>
    <script src="https://crazypeace.github.io/Url-Shorten-Worker/main.js" crossorigin="anonymous"></script>

    <script>
      const popoverTriggerList = document.querySelectorAll('[data-bs-toggle="popover"]');
      [...popoverTriggerList].forEach(
        (popoverTriggerEl) =>
          new bootstrap.Popover(popoverTriggerEl, {
            trigger: "click",
            delay: { show: 500, hide: 100 },
          })
      );

      document.querySelectorAll('[data-bs-toggle="popover"]').forEach((button) => {
        button.addEventListener("click", function () {
          setTimeout(() => {
            const popover = bootstrap.Popover.getInstance(button);
            if (popover) setTimeout(() => popover.hide(), 1000);
          }, 1000);
        });
      });

      const originalClearLocalStorage = window.clearLocalStorage;
      window.clearLocalStorage = function () {
        if (confirm("确定要清空所有本地记录吗？")) {
          if (typeof originalClearLocalStorage === "function") originalClearLocalStorage();
        }
      };

      const originalDeleteShortUrl = window.deleteShortUrl;
      window.deleteShortUrl = function (key) {
        if (confirm("确定删除此链接吗？")) {
          if (typeof originalDeleteShortUrl === "function") originalDeleteShortUrl(key);
        }
      };

      const urlList = document.getElementById("urlList");
      const emptyState = document.getElementById("urlEmptyState");
      function syncEmptyState() {
        if (!urlList || !emptyState) return;
        emptyState.classList.toggle("is-hidden", urlList.children.length > 0);
      }
      if (urlList) {
        new MutationObserver(syncEmptyState).observe(urlList, { childList: true, subtree: false });
        window.addEventListener("load", syncEmptyState);
        syncEmptyState();
      }
    </script>
  </body>
</html>
